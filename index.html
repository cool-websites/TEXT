<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOID ARCADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07080f;
    --bg2: #0d0f1a;
    --surface: #111524;
    --border: rgba(255,255,255,0.07);
    --accent: #6366f1;
    --accent2: #22d3ee;
    --accent3: #f472b6;
    --text: #e2e8f0;
    --muted: #475569;
    --card-radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ───────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(7,8,15,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .logo span {
    opacity: 0.5;
    font-weight: 400;
  }

  .header-search {
    flex: 1;
    max-width: 420px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px 9px 38px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .header-search input:focus { border-color: var(--accent); }
  .header-search input::placeholder { color: var(--muted); }

  .header-search::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  .xp-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }

  .xp-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .xp-value {
    color: var(--accent2);
    font-size: 14px;
    font-weight: 700;
  }

  /* ── MAIN LAYOUT ─────────────────────────────────── */
  .layout {
    display: flex;
    min-height: calc(100vh - 61px);
  }

  /* ── SIDEBAR ──────────────────────────────────────── */
  aside {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 24px 0;
    background: var(--bg2);
    position: sticky;
    top: 61px;
    height: calc(100vh - 61px);
    overflow-y: auto;
  }

  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  .sidebar-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 9px 10px;
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }

  .sidebar-btn:hover { background: rgba(99,102,241,0.1); color: #fff; }
  .sidebar-btn.active { background: rgba(99,102,241,0.15); color: var(--accent); }

  .sidebar-btn .cat-emoji { font-size: 16px; line-height: 1; }

  .cat-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    border-radius: 99px;
  }

  /* ── MAIN CONTENT ────────────────────────────────── */
  main {
    flex: 1;
    padding: 28px 32px;
    min-width: 0;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 20px;
    color: #f1f5f9;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── GAME GRID ───────────────────────────────────── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .game-card {
    border-radius: var(--card-radius);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    position: relative;
    background: var(--surface);
  }

  .game-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(99,102,241,0.25);
  }

  .game-card-thumb {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
    overflow: hidden;
  }

  .game-card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.5));
  }

  .game-card-info {
    padding: 10px 12px;
  }

  .game-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #f1f5f9;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-card-xp {
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .game-card-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 9px;
    color: #94a3b8;
    letter-spacing: 1px;
    z-index: 1;
  }

  .type-internal { color: var(--accent); border-color: rgba(99,102,241,0.4); }
  .type-remote { color: var(--accent3); border-color: rgba(244,114,182,0.4); }

  /* ── GAME VIEWER ─────────────────────────────────── */
  #game-viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 500;
    flex-direction: column;
  }

  #game-viewer.visible { display: flex; }

  .viewer-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 20px;
    background: rgba(7,8,15,0.95);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .viewer-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 2px;
    flex: 1;
    color: #fff;
  }

  .viewer-xp {
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .btn-close {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #ef4444;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s;
  }

  .btn-close:hover { background: rgba(239,68,68,0.3); }

  #game-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #game-canvas {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #game-frame {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── SCORE SCREEN ────────────────────────────────── */
  #score-screen {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(7,8,15,0.97);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
  }

  #score-screen.visible { display: flex; }

  .score-title {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .score-value {
    font-size: 64px;
    font-weight: 700;
    color: #fff;
  }

  .score-xp {
    font-size: 18px;
    color: var(--accent2);
    letter-spacing: 2px;
  }

  .score-btns {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    border: none;
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TOAST ───────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    letter-spacing: 0.5px;
    z-index: 9998;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    max-width: 300px;
  }

  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── NO RESULTS ──────────────────────────────────── */
  .no-results {
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
    display: none;
  }

  /* ── SCROLLBAR ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

  /* ── HERO STRIP ──────────────────────────────────── */
  .hero {
    background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(34,211,238,0.05));
    border: 1px solid rgba(99,102,241,0.15);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .hero-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-text p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  .hero-stats {
    display: flex;
    gap: 28px;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
  }

  .hero-stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* ── CATEGORY FILTER PILLS ───────────────────────── */
  .cat-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .cat-pill {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
  .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 900px) {
    aside { display: none; }
    .hero { flex-direction: column; }
    .hero-stats { justify-content: center; }
    main { padding: 20px 16px; }
    header { padding: 14px 16px; }
    .logo { font-size: 17px; }
  }
</style>
</head>

<script>
// ── STATE ────────────────────────────────────────────────────
let totalXP = parseInt(localStorage.getItem('voidXP') || '0');
let gamesPlayed = parseInt(localStorage.getItem('voidPlayed') || '0');
let currentGameKey = null;
let currentCategory = 'all';
let currentSort = 'default';
let currentSearch = '';

// Genre mapping
const genreMap = {
  action: ['dodger','zombie','voidWarzone','getawayShooter','battleRoyale','geometryRush','neonDrift','rooftopSniper2','battleWheels','gunspin'],
  racing: ['snowRider','neonDrift','rushRace','highwayBike','bikerStreet','slope2','trafficRush'],
  puzzle: ['snake','pacman','tetris','doodleBlock','tileMatch','chess','numbskull','portraitObsession'],
  sports: ['pingpong','superLiquidSoccer','fourthGoal','americanFootball','goalKeeper','tag'],
  idle: ['idleTreeCity','idleFarming','cookieClicker','idleAnts','screenSaver'],
  survival: ['zombie','battleRoyale','deadzone','caveChaos','frostwing'],
};

// ── XP DISPLAY ───────────────────────────────────────────────
function updateXPDisplay() {
  document.getElementById('xp-display').textContent = totalXP.toLocaleString();
  document.getElementById('stat-xp').textContent = totalXP.toLocaleString();
  document.getElementById('stat-played').textContent = gamesPlayed;
}

// ── BUILD GAME LIST ───────────────────────────────────────────
function getAllGames() {
  return Object.entries(GamesLib).map(([key, g]) => ({ key, ...g }));
}

// ── RENDER ───────────────────────────────────────────────────
function renderGrid(games) {
  const grid = document.getElementById('game-grid');
  const noRes = document.getElementById('no-results');
  grid.innerHTML = '';

  if (games.length === 0) {
    noRes.style.display = 'block';
    return;
  }

  noRes.style.display = 'none';

  games.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => launchGame(g.key);
    card.innerHTML = `
      <div class="game-card-thumb" style="background:${g.color}">
        <span>${g.emoji}</span>
        <span class="game-card-badge ${g.type === 'internal' ? 'type-internal' : 'type-remote'}">${g.type === 'internal' ? 'BUILT-IN' : 'ONLINE'}</span>
      </div>
      <div class="game-card-info">
        <div class="game-card-title">${g.title}</div>
        <div class="game-card-xp">+${g.xpMultiplier} XP / PLAY</div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── FILTERING ────────────────────────────────────────────────
function getFilteredGames() {
  let games = getAllGames();

  if (currentSearch.length > 0) {
    const q = currentSearch.toLowerCase();
    games = games.filter(g => g.title.toLowerCase().includes(q));
  }

  if (currentCategory === 'internal') {
    games = games.filter(g => g.type === 'internal');
  } else if (currentCategory === 'remote') {
    games = games.filter(g => g.type === 'remote');
  } else if (genreMap[currentCategory]) {
    const keys = genreMap[currentCategory];
    games = games.filter(g => keys.includes(g.key));
  }

  if (currentSort === 'xp') {
    games.sort((a, b) => b.xpMultiplier - a.xpMultiplier);
  } else if (currentSort === 'az') {
    games.sort((a, b) => a.title.localeCompare(b.title));
  }

  return games;
}

function refreshGrid() {
  const games = getFilteredGames();
  renderGrid(games);
  document.getElementById('section-label').textContent =
    currentSearch ? `RESULTS FOR "${currentSearch.toUpperCase()}"` :
    currentCategory === 'all' ? 'ALL GAMES' :
    currentCategory.toUpperCase() + ' GAMES';
}

function filterGames() {
  currentSearch = document.getElementById('search-input').value.trim();
  refreshGrid();
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  // update sidebar buttons
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // update pills
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === cat);
  });
  refreshGrid();
}

function sortGames(mode) {
  currentSort = mode;
  refreshGrid();
}

// ── LAUNCH ───────────────────────────────────────────────────
function launchGame(key) {
  const g = GamesLib[key];
  if (!g) return;
  currentGameKey = key;

  document.getElementById('viewer-title').textContent = g.title;
  document.getElementById('viewer-xp').textContent = `+${g.xpMultiplier} XP`;
  document.getElementById('score-screen').classList.remove('visible');
  document.getElementById('game-viewer').classList.add('visible');
  document.body.style.overflow = 'hidden';

  const canvas = document.getElementById('game-canvas');
  const frame = document.getElementById('game-frame');

  if (g.type === 'remote') {
    canvas.style.display = 'none';
    frame.style.display = 'block';
    frame.src = g.url;
    // Award XP immediately for remote games when opened
    setTimeout(() => awardXP(g), 3000);
  } else {
    frame.style.display = 'none';
    frame.src = '';
    canvas.style.display = 'block';

    const area = document.getElementById('game-area');
    canvas.width = area.clientWidth;
    canvas.height = area.clientHeight;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Clean up previous game
    if (typeof window._gameCleanup === 'function') {
      try { window._gameCleanup(); } catch(e){}
    }
    window._gameCleanup = null;

    g.init(canvas, ctx, (score) => {
      onGameOver(g, score);
    });
  }
}

function onGameOver(g, score) {
  const xpEarned = g.xpMultiplier * Math.max(1, Math.floor(score / 10));
  totalXP += xpEarned;
  gamesPlayed++;
  localStorage.setItem('voidXP', totalXP);
  localStorage.setItem('voidPlayed', gamesPlayed);
  updateXPDisplay();

  document.getElementById('final-score').textContent = score;
  document.getElementById('earned-xp').textContent = `+${xpEarned} XP EARNED`;
  document.getElementById('score-screen').classList.add('visible');
  showToast(`+${xpEarned} XP earned!`);
}

function awardXP(g) {
  totalXP += g.xpMultiplier;
  gamesPlayed++;
  localStorage.setItem('voidXP', totalXP);
  localStorage.setItem('voidPlayed', gamesPlayed);
  updateXPDisplay();
  showToast(`+${g.xpMultiplier} XP earned!`);
}

function playAgain() {
  document.getElementById('score-screen').classList.remove('visible');
  if (currentGameKey) launchGame(currentGameKey);
}

function closeGame() {
  const frame = document.getElementById('game-frame');
  const canvas = document.getElementById('game-canvas');

  if (typeof window._gameCleanup === 'function') {
    try { window._gameCleanup(); } catch(e) {}
    window._gameCleanup = null;
  }

  frame.src = '';
  frame.style.display = 'none';
  canvas.style.display = 'none';

  document.getElementById('score-screen').classList.remove('visible');
  document.getElementById('game-viewer').classList.remove('visible');
  document.body.style.overflow = '';
  currentGameKey = null;
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────
function init() {
  const games = getAllGames();
  const internal = games.filter(g => g.type === 'internal');
  const remote = games.filter(g => g.type === 'remote');

  document.getElementById('count-all').textContent = games.length;
  document.getElementById('count-internal').textContent = internal.length;
  document.getElementById('count-remote').textContent = remote.length;
  document.getElementById('stat-total').textContent = games.length;

  // Build genre pills
  const pills = document.getElementById('cat-pills');
  const pillDefs = [
    { cat: 'all', label: '🎮 All' },
    { cat: 'action', label: '⚔️ Action' },
    { cat: 'racing', label: '🏎️ Racing' },
    { cat: 'puzzle', label: '🧩 Puzzle' },
    { cat: 'sports', label: '⚽ Sports' },
    { cat: 'idle', label: '💤 Idle' },
    { cat: 'survival', label: '🧟 Survival' },
    { cat: 'internal', label: '🕹️ Built-In' },
    { cat: 'remote', label: '🌐 Online' },
  ];
  pillDefs.forEach(({ cat, label }) => {
    const p = document.createElement('button');
    p.className = 'cat-pill' + (cat === 'all' ? ' active' : '');
    p.dataset.cat = cat;
    p.textContent = label;
    p.onclick = () => filterCategory(cat, null);
    pills.appendChild(p);
  });

  updateXPDisplay();
  refreshGrid();
}

window.addEventListener('DOMContentLoaded', init);

// Escape closes game
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && currentGameKey && document.getElementById('game-viewer').classList.contains('visible')) {
    // Only close if not in an internal game (internal games use canvas)
    const frame = document.getElementById('game-frame');
    if (frame.style.display !== 'none') closeGame();
  }
});
</script>
</body>
